<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>404 — Page Not Found | LISHI LASER</title>
  <link rel="canonical" href="https://gasmixtech.com/404.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-dark);
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(220,38,38,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .error-container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }
    .error-code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-line {
      width: 60px;
      height: 3px;
      background: var(--color-primary);
      margin: 24px auto;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text-inverse);
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 1rem;
      color: var(--color-text-inverse-muted);
      margin-bottom: 40px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-footer {
      position: absolute;
      bottom: 32px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--color-text-inverse-muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-container">
      <div class="error-code">404</div>
      <div class="error-line"></div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved. It might have been a broken link, a typo in the URL, or the page was removed.</p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">Back to Home</a>
        <a href="/contact.html" class="btn btn-secondary">Contact Us</a>
      </div>
    </div>
    <div class="error-footer">&copy; 2026 Jinan Euchio Machinery Co., Ltd. &mdash; gasmixtech.com</div>
  </div>
</body>
</html>
