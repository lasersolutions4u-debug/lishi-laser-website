<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <!-- G letter suggesting Gas/Mixing -->
  <text x="32" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#grad)" text-anchor="middle">G</text>
  <!-- Mixing dots -->
  <circle cx="20" cy="18" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="44" cy="18" r="4" fill="#06b6d4" opacity="0.8"/>
  <circle cx="20" cy="46" r="4" fill="#06b6d4" opacity="0.8"/>
  <circle cx="44" cy="46" r="4" fill="#3b82f6" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="white"/>
</svg>
